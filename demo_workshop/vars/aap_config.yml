---
aap_organizations:
  - name: "AAP_Training"
    description: "Org for Training Exercises"
    state: present
  - name: "AAP_Training_Admin"
    description: "Org for Training Exercises Administration"
    state: present


aap_teams:
  - name: "Students"
    description: "Exercise Students Team"
    organization: "AAP_Training"
    state: present

aap_user_accounts:
  - username: "test"
    first_name: "Test"
    last_name: "Workshop"
    password: "Password1"
    organization: "AAP_Training"
    state: present


controller_inventories:
  - name: "Exercise"
    description: "Exercise Servers"
    organization: "AAP_Training_Admin"
    state: present

controller_hosts:
  - name: "localhost"
    inventory: "Exercise"
    description: "Localhost for testing"
    enabled: true
  - name: "win-app01-db"
    inventory: "Exercise"
    description: "Windows App01 Database Server"
    enabled: true
  - name: "win-app01-web"
    inventory: "Exercise"
    description: "Windows App01 Web Server"
    enabled: true
  - name: "rhel-app02-web-01"
    inventory: "Exercise"
    description: "RHEL App02 Web Server 1"
    enabled: true
  - name: "rhel-app02-web-02"
    inventory: "Exercise"
    description: "RHEL App02 Web Server 2"
    enabled: true
  - name: "rhel-app02-db"
    inventory: "Exercise"
    description: "RHEL App02 Database Server"
    enabled: true

controller_credentials:
  - name: "Exercise"
    description: "Exercise Server Credentials"
    organization: "AAP_Training_Admin"
    credential_type: "Machine"
    inputs:
      username: "aap"
      password: "invalid_password"

gateway_role_user_assignments:
  - role_definition: "Team Member"
    object_ids: 
      - "Students"
    user: "test"

controller_roles:
  - team: "Students"
    roles:
      - read
      - use
    credential: "Exercise"
    lookup_organization: "AAP_Training_Admin"
    state: present
  - team: "Students"
    roles: 
      - read
      - use
    inventory: "Exercise"
    lookup_organization: "AAP_Training_Admin"
    state: present

  - team: "Students"
    organizations:
      - "AAP_Training"
    roles: 
      - execute
      - job_template_admin
      - project_admin
      - inventory_admin
      - workflow_admin
...