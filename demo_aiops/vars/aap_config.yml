---
aap_organizations:
  - name: "midrange"
    description: "Midrange Team"
    state: present
  - name: "secure"
    description: "Secure Zone"
    state: present
  - name: "aiops"
    description: "AIOps Agent Team"
    state: present

aap_teams:
  - name: "Midrange Admins"
    description: "Midrange Admins Team"
    organization: "midrange"
    state: present

aap_user_accounts:
  - username: "midrange_admin"
    is_superuser: false
    password: "abc123"
    email: "midrange@example.com"
    state: present

controller_projects:
  - name: "aiops-project"
    description: "AIOps Playbooks"
    organization: "midrange"
    scm_type: git
    scm_url: "https://github.com/derekwaters/ansible_devops_demo.git"
    scm_branch: main
    scm_clean: true
    scm_update_on_launch: false
    update_project: true
    wait: true
    state: present
  - name: "secure-project"
    description: "Secure Playbooks"
    organization: "secure"
    scm_type: git
    scm_url: "https://github.com/derekwaters/ansible_devops_demo.git"
    scm_branch: main
    scm_clean: true
    scm_update_on_launch: false
    update_project: true
    wait: true
    state: present
  - name: "aiops-agent-project"
    description: "AIOps Agent Playbooks"
    organization: "aiops"
    scm_type: git
    scm_url: "https://github.com/derekwaters/ansible_devops_demo.git"
    scm_branch: main
    scm_clean: true
    scm_update_on_launch: false
    update_project: true
    wait: true
    state: present


controller_credentials:
  - name: "midrange-creds"
    description: "Midrange Server Credentials"
    organization: "midrange"
    credential_type: "Machine"
    inputs:
      username: "aap"
      password: "invalid_password"

controller_inventories:
  - name: "midrange-vms"
    description: "Midrange Servers"
    organization: "midrange"
    # TODO: Uncomment when this parameter is supported by the collections
    # opa_query_path: "aap_tests/allowed"
    state: present
  - name: "secure-vms"
    description: "Secure Zone Servers"
    organization: "secure"
    state: present

controller_hosts:
  - name: "app-web-01"
    inventory: "midrange-vms"
    description: "Application Web Server 01"
    enabled: true
  - name: "app-web-02"
    inventory: "midrange-vms"
    description: "Application Web Server 02"
    enabled: true
  - name: "app-db-01"
    inventory: "midrange-vms"
    description: "Application Database Server 01"
    enabled: true
  - name: "app-db-02"
    inventory: "midrange-vms"
    description: "Application Database Server 02"
    variables:
      ansible_connection: local
    enabled: true
  - name: "app-audit-01"
    inventory: "midrange-vms"
    description: "Application Audit Server 01"
    enabled: true
  - name: "secure-host-001"
    inventory: "secure-vms"
    description: "Secure Zone Host 001"
    enabled: true

controller_templates:
  - name: "01_expand_disk"
    playbook: "{{ demo_name }}/playbooks/expand_disk.yml"
    description: "Expand the available disk space on a server using lvm"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "02_forensic_isolation"
    playbook: "{{ demo_name }}/playbooks/forensic_isolation.yml"
    description: "Isolate a server from the network for forensic analysis"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "03_renew_certificate"
    playbook: "{{ demo_name }}/playbooks/renew_certificate.yml"
    description: "Renew an application web serving TLS certificate"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "04_restart_application"
    playbook: "{{ demo_name }}/playbooks/restart_application.yml"
    description: "Restart a failed application service"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "05_scale_down_ec2"
    playbook: "{{ demo_name }}/playbooks/scale_down_ec2.yml"
    description: "Scale down an AWS EC2 instance to a smaller size with reduced compute and memory resources"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "06_scale_up_ec2"
    playbook: "{{ demo_name }}/playbooks/scale_up_ec2.yml"
    description: "Scale up an AWS EC2 instance to a larger size with increased compute and memory resources"
    job_type: "run"
    organization: "midrange"
    credentials:
      - "midrange-creds"
    project: "aiops-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "secure_restart_server"
    playbook: "{{ demo_name }}/playbooks/secure_restart.yml"
    description: "Restart high compliance server in the secure zone"
    job_type: "run"
    organization: "secure"
    inventory: "secure-vms"
    project: "secure-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present


  # AIOps Agent Workflow nodes
  - name: "aiops_agent"
    playbook: "{{ demo_name }}/playbooks/aiops_agent.yml"
    description: "Use an AI agent to attempt to solve an event with AAP"
    job_type: "run"
    organization: "aiops"
    project: "aiops-agent-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "aiops_gen_playbook"
    playbook: "{{ demo_name }}/playbooks/aiops_gen_playbook.yml"
    description: "Use an AI agent to generate a new playbook and an amended rulebook to handle unknown error events"
    job_type: "run"
    organization: "aiops"
    project: "aiops-agent-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present
  - name: "aiops_gen_rulebook"
    playbook: "{{ demo_name }}/playbooks/aiops_gen_rulebook.yml"
    description: "Use an AI agent to generate an amended rulebook to handle known error events"
    job_type: "run"
    organization: "aiops"
    project: "aiops-agent-project"
    ask_variables_on_launch: true
    ask_limit_on_launch: true
    ask_inventory_on_launch: true
    state: present

controller_workflows:
  - name: "aiops_workflow"
    description: "Use an AI Agent to solve event issues"
    organization: "aiops"
    inventory: "Demo Inventory"
    state: present
    extra_vars:
      remote_repo: "tbd"
      remote_branch: "dev"
      destination_email: "pipelines@company.com.au"
      source_email: "aap_build_bot@company.com.au"
    ask_variables_on_launch: true
    simplified_workflow_nodes:
      - identifier: aiops_agent
        unified_job_template: "aiops_agent"
        success_nodes:
          - "aiops_gen_rulebook"
        failure_nodes:
          - "aiops_gen_playbook"
        always_nodes: []
        credentials: []

      - identifier: aiops_gen_rulebook
        unified_job_template: "aiops_gen_rulebook"
        success_nodes: []
        failure_nodes: []
        always_nodes: []
        credentials: []

      - identifier: aiops_gen_playbook
        unified_job_template: "aiops_gen_playbook"
        success_nodes: []
        failure_nodes: []
        always_nodes: []
        credentials: []

controller_roles:
  - user: "midrange_admin"
    target_team: "Midrange Admins"
    roles:
      - "member"
    state: present
  - team: "Midrange Admins"
    organization: "midrange"
    roles:
      - "execute"
      - "read"
    state: present
  - user: "midrange_admin"
    inventory: "midrange-vms"
    roles:
      - "use"
    state: present
  - user: "midrange_admin"
    job_templates:
      - "01_expand_disk"
      - "02_forensic_isolation"
      - "03_renew_certificate"
      - "04_restart_application"
      - "05_scale_down_ec2"
      - "06_scale_up_ec2"
      - "aiops_agent"
      - "aiops_gen_playbook"
      - "aiops_gen_rulebook"
    roles:
      - "execute"
      - "read"
    state: present
...
