---
- name: Notify Change Details
  hosts: all

  tasks:
    - name: Notify Change Details (status)
      ansible.builtin.debug:
        var: status
    - name: Notify Change Details (status_dict)
      ansible.builtin.debug:
        var: status_dict
    - name: Notify Change Details (status_dict2)
      ansible.builtin.debug:
        var: status_dict_2
    - name: Notify Change Details (change_number)
      ansible.builtin.debug:
        var: change_number
    - name: Notify Change Details (failure_reason)
      ansible.builtin.debug:
        var: failure_reason
    - name: Notify all details;
      ansible.builtin.debug: 
        var: ansible_facts

    - name: Recreate the status array
      ansible.builtin.set_fact:
        status_array: "{{ (status_array | default({})) | combine({ item[7:] : (vars[item] | default()) }) }}"
      loop:
        - "status_001_raise"
        - "status_002_schedule"
        - "status_003_close"

    - name: Notify status array
      ansible.builtin.debug: 
        var: status_array