---
- name: Schedule a Change
  hosts: all

  tasks:
    - name: Print a pretty little message
      ansible.builtin.debug:
        msg: "Trying to schedule change {{ change_number }}"
        
    - name: Ensure the Change is Scheduled
      ansible.builtin.set_stats:
        status: "Change Could Not Be Scheduled"
        failure_reason: "Wrong Month"
    
    - name: Ensure the scheduling fails
      ansible.builtin.fail:
        msg: "It failed"
