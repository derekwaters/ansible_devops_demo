---
- name: Raise a Change
  hosts: all

  tasks:
    - name: Ensure the Change is Raised
      ansible.builtin.set_stats:
        data:
          status: "Change Raised"
          status_dict:
            raise_change: "Complete"
            schedule_change: None
            close_change: None
          status_dict_2:
            raise_change: "Complete"
          change_number: "CHG-001"
